name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      MARKDOWNPP_IS_STABLE: 1
      MARKDOWNPP_EXIT_ON_ERROR: 1
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read package version
        id: package
        shell: pwsh
        run: |
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          "version=$($package.version)" >> $env:GITHUB_OUTPUT
          "tag=v$($package.version)" >> $env:GITHUB_OUTPUT

      - name: Generate release notes
        shell: pwsh
        run: |
          $tag = "${{ steps.package.outputs.tag }}"
          $previousTag = git tag --list "v*" --sort=-version:refname |
            Where-Object { $_ -ne $tag } |
            Select-Object -First 1

          $notesFile = "build\RELEASE_NOTES.md"
          New-Item -ItemType Directory -Force build | Out-Null

          $notesArgs = @(
            "api",
            "repos/$env:GITHUB_REPOSITORY/releases/generate-notes",
            "--method", "POST",
            "-f", "tag_name=$tag",
            "-f", "target_commitish=$env:GITHUB_SHA"
          )
          if ($previousTag) {
            $notesArgs += @("-f", "previous_tag_name=$previousTag")
          }

          $generated = & gh @notesArgs | ConvertFrom-Json
          $body = @()
          $body += $generated.body
          $body += ""
          $body += "## Downloads"
          $body += ""
          $body += "- `markdownpp-setup.exe` - Windows installer"
          $body += "- `markdownpp-portable.exe` - Windows portable build"
          $body += "- `markdownpp-x64-win.zip` - Windows zip archive"
          $body += "- `SHA256SUMS.txt` - SHA256 checksums"
          $body += ""
          $body += "## Version"
          $body += ""
          $body += "- Package version: `${{ steps.package.outputs.version }}`"
          if ($previousTag) {
            $body += "- Changes since: `$previousTag`"
          }
          $body | Set-Content -Encoding utf8 $notesFile
          Get-Content $notesFile

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 16
          check-latest: true
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Fix node-gyp
        shell: pwsh
        run: |
          npm install --global node-gyp@latest
          npm prefix -g | % {npm config set node_gyp "$_\node_modules\node-gyp\bin\node-gyp.js"}
          node-gyp install

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}\node_modules
          key: ${{ runner.os }}-node_modules-cache-v2-${{ hashFiles(format('{0}{1}', github.workspace, '\yarn.lock')) }}
          restore-keys: |
            ${{ runner.os }}-node_modules-cache-v2-

      - name: Cache Electron
        uses: actions/cache@v5
        with:
          path: ${{ env.LOCALAPPDATA }}\electron\Cache
          key: ${{ runner.os }}-electron-cache-v2-${{ hashFiles(format('{0}{1}', github.workspace, '\yarn.lock')) }}

      - name: Cache Electron-Builder
        uses: actions/cache@v5
        with:
          path: ${{ env.LOCALAPPDATA }}\electron-builder\cache
          key: ${{ runner.os }}-electron-builder-cache-v2-${{ hashFiles(format('{0}{1}', github.workspace, '\yarn.lock')) }}

      - name: Install dependencies
        run: yarn install --check-files --frozen-lockfile

      - name: Lint
        run: |
          yarn run lint

      - name: Run unit tests
        run: yarn run unit

      - name: Build Windows release artifacts
        run: yarn run release:win

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $files = @(
            "build\markdownpp-setup.exe",
            "build\markdownpp-portable.exe",
            "build\markdownpp-x64-win.zip"
          )
          $lines = foreach ($file in $files) {
            $hash = Get-FileHash -Algorithm SHA256 $file
            "$($hash.Hash.ToLower()) *$(Split-Path $file -Leaf)"
          }
          $lines | Set-Content -Encoding ascii "build\SHA256SUMS.txt"
          Get-Content "build\SHA256SUMS.txt"

      - name: Publish GitHub release
        shell: pwsh
        run: |
          $tag = "${{ steps.package.outputs.tag }}"
          $title = "MarkDown++ $tag"
          $assets = @(
            "build\markdownpp-setup.exe",
            "build\markdownpp-portable.exe",
            "build\markdownpp-x64-win.zip",
            "build\markdownpp-setup.exe.blockmap",
            "build\latest.yml",
            "build\SHA256SUMS.txt"
          )

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag `
              --repo $env:GITHUB_REPOSITORY `
              --target $env:GITHUB_SHA `
              --title $title `
              --notes-file "build\RELEASE_NOTES.md" `
              --latest
            gh release upload $tag @assets --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $tag @assets `
              --repo $env:GITHUB_REPOSITORY `
              --target $env:GITHUB_SHA `
              --title $title `
              --notes-file "build\RELEASE_NOTES.md" `
              --latest
          }
